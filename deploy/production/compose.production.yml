services:
  openplotva:
    image: ${OPENPLOTVA_IMAGE:?OPENPLOTVA_IMAGE is required}
    env_file:
      - .env.production
    environment:
      WEBAPP_HOST: 0.0.0.0
      WEBAPP_PORT: 8080
      DB_POSTGRES_HOST: postgresql
      DB_POSTGRES_PORT: 5432
      DB_POSTGRES_USER: ${DB_POSTGRES_USER:-plotva}
      DB_POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:?DB_POSTGRES_PASSWORD is required}
      DB_POSTGRES_DB: ${DB_POSTGRES_DB:-plotva}
      DB_POSTGRES_SSL_MODE: disable
      REDIS_HOST: dragonfly
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      UPDATE_QUEUE_BACKEND: stream
      UPDATE_STREAM_REDIS_URL: redis://redis-ingress:6379/0
      UPDATE_MATERIALIZER_BATCH_MAX_ROWS: ${UPDATE_MATERIALIZER_BATCH_MAX_ROWS:-512}
      UPDATE_MATERIALIZER_BATCH_MAX_BYTES: ${UPDATE_MATERIALIZER_BATCH_MAX_BYTES:-8388608}
      UPDATE_MATERIALIZER_BATCH_MAX_WAIT_MS: ${UPDATE_MATERIALIZER_BATCH_MAX_WAIT_MS:-50}
      UPDATE_MATERIALIZER_DB_TIMEOUT_MS: ${UPDATE_MATERIALIZER_DB_TIMEOUT_MS:-5000}
      MEMORY_TOKEN_ESTIMATOR_URL: http://token-estimator:12600
      RUNTIME_API_ENABLED: "true"
      RUNTIME_API_HOST: 0.0.0.0
      RUNTIME_API_PORT: 9091
      RUNTIME_API_CERT_FILE: /home/openplotva/.plotva/runtime-api.crt
      RUNTIME_API_KEY_FILE: /home/openplotva/.plotva/runtime-api.key
      OPENPLOTVA_CONNECT_SERVICES: "true"
      OPENPLOTVA_RUN_MIGRATIONS: "true"
      OPENPLOTVA_CONSUME_UPDATES: "true"
      OPENPLOTVA_PRODUCE_UPDATES: "true"
    ports:
      - "127.0.0.1:8080:8080"
      - "${OPENPLOTVA_RUNTIME_API_PUBLISH_HOST:-100.77.77.51}:9091:9091"
    volumes:
      - openplotva-state:/home/openplotva/.plotva
    depends_on:
      postgresql:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      redis-ingress:
        condition: service_healthy
      token-estimator:
        condition: service_healthy
    networks:
      - plotva-net
    restart: unless-stopped
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  postgresql:
    image: pgvector/pgvector:pg17-trixie
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER:-plotva}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:?DB_POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${DB_POSTGRES_DB:-plotva}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements,auto_explain
      - -c
      - pg_stat_statements.max=10000
      - -c
      - pg_stat_statements.track=top
      - -c
      - pg_stat_statements.track_utility=off
      - -c
      - pg_stat_statements.save=on
      - -c
      - track_io_timing=on
      - -c
      - compute_query_id=auto
      - -c
      - auto_explain.log_min_duration=50ms
      - -c
      - auto_explain.log_analyze=on
      - -c
      - auto_explain.log_buffers=on
      - -c
      - auto_explain.log_nested_statements=on
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - plotva-net
    logging:
      driver: none

  dragonfly:
    image: ${DRAGONFLY_IMAGE:-docker.dragonflydb.io/dragonflydb/dragonfly:v1.38.1}
    ulimits:
      memlock: -1
    volumes:
      - dragonfly-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - plotva-net
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  redis-ingress:
    image: ${UPDATE_STREAM_REDIS_IMAGE:-valkey/valkey:8.1-alpine}
    command:
      - valkey-server
      - --appendonly
      - "yes"
      - --appendfsync
      - always
      - --maxmemory
      - ${UPDATE_STREAM_MAXMEMORY:-2867mb}
      - --maxmemory-policy
      - noeviction
    mem_limit: ${UPDATE_STREAM_CONTAINER_MEMORY:-4g}
    volumes:
      - redis-ingress-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - plotva-net
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  token-estimator:
    build:
      context: ./tools/token-estimator
    env_file:
      - .env.production
    environment:
      TOKEN_ESTIMATOR_MODEL: google/gemma-4-26B-A4B-it
      TOKEN_ESTIMATOR_MAX_TEXT_CHARS: 1000000
    volumes:
      - token-estimator-cache:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:12600/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    networks:
      - plotva-net
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

networks:
  plotva-net:
    driver: bridge

volumes:
  openplotva-state:
  postgres-data:
  dragonfly-data:
  redis-ingress-data:
  token-estimator-cache:
