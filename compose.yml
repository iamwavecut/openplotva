name: openplotva

services:
  openplotva:
    build:
      context: .
    environment:
      WEBAPP_HOST: 0.0.0.0
      WEBAPP_PORT: 8080
      WEBAPP_URL: ${WEBAPP_URL:-http://127.0.0.1:8080}
      DB_POSTGRES_HOST: postgres
      DB_POSTGRES_PORT: 5432
      DB_POSTGRES_USER: ${DB_POSTGRES_USER:-plotva}
      DB_POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:-plotva}
      DB_POSTGRES_DB: ${DB_POSTGRES_DB:-plotva}
      DB_POSTGRES_SSL_MODE: disable
      REDIS_HOST: dragonfly
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      OPENPLOTVA_CONNECT_SERVICES: "true"
      OPENPLOTVA_RUN_MIGRATIONS: "true"
      OPENPLOTVA_CONSUME_UPDATES: "false"
      OPENPLOTVA_PRODUCE_UPDATES: "false"
      BOT_KEY: ${BOT_KEY:-}
      BOT_API_BASE_URL: ${BOT_API_BASE_URL:-}
      RUNTIME_API_ENABLED: ${RUNTIME_API_ENABLED:-false}
      RUNTIME_API_HOST: 0.0.0.0
      RUNTIME_API_PORT: 9091
      RUNTIME_API_CERT_FILE: ${RUNTIME_API_CERT_FILE:-}
      RUNTIME_API_KEY_FILE: ${RUNTIME_API_KEY_FILE:-}
      RUNTIME_API_TLS_PUBLIC_KEY_PIN: ${RUNTIME_API_TLS_PUBLIC_KEY_PIN:-}
    ports:
      - "${OPENPLOTVA_DEV_APP_PORT:-8080}:8080"
      - "${OPENPLOTVA_DEV_RUNTIME_API_PORT:-9091}:9091"
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER:-plotva}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:-plotva}
      POSTGRES_DB: ${DB_POSTGRES_DB:-plotva}
    ports:
      - "${OPENPLOTVA_DEV_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.38.1
    command: ["--logtostderr", "--cache_mode=false"]
    ports:
      - "${OPENPLOTVA_DEV_REDIS_PORT:-56379}:6379"
    volumes:
      - dragonfly-data:/data

volumes:
  postgres-data:
  dragonfly-data:
