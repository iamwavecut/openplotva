name: Security Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "21 3 * * 1"

env:
  SEMGREP_VERSION: "1.163.0"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql-rust:
    name: CodeQL Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"
          upload: never
          upload-database: false
          wait-for-processing: false

  semgrep:
    name: Semgrep CE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Semgrep
        run: python -m pip install "semgrep==${SEMGREP_VERSION}"

      - name: Run Semgrep
        run: semgrep scan --config=auto --sarif --output=semgrep.sarif .

      - name: Validate Semgrep SARIF
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("semgrep.sarif")
          if not path.is_file() or path.stat().st_size == 0:
              raise SystemExit("semgrep.sarif was not created or is empty")

          with path.open(encoding="utf-8") as handle:
              payload = json.load(handle)

          if payload.get("version") != "2.1.0" or not isinstance(payload.get("runs"), list):
              raise SystemExit("semgrep.sarif is not a valid SARIF 2.1.0 payload")
          PY

      - name: Upload Semgrep SARIF
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
