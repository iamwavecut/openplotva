name: Production Deploy

on:
  workflow_dispatch:

env:
  RUST_VERSION: "1.95.0"
  GETA_SSH_TARGET: wavecut@geta.moe
  GETA_DEPLOY_ROOT: /home/wavecut/openplotva

permissions: {}

jobs:
  authorize:
    name: Authorize deployment operator
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Require repository owner
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.actor }}" != "iamwavecut" || "${{ github.triggering_actor }}" != "iamwavecut" ]]; then
            echo "Production deploy can only be started or re-run by iamwavecut" >&2
            exit 1
          fi

  build-and-deploy:
    name: Build image and deploy
    needs: authorize
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ env.RUST_VERSION }}-deploy-v1

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component rustfmt
          rustup default "$RUST_VERSION"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ runner.os }}-ubuntu-22.04-${{ env.RUST_VERSION }}-deploy

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check Rust workspace
        run: cargo check --workspace --all-targets --all-features

      - name: Build release binary
        run: cargo build --locked --release -p openplotva-app

      - name: Select GHCR image tag
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_SHA}"
          image="$(printf '%s' "$image" | tr '[:upper:]' '[:lower:]')"
          echo "OPENPLOTVA_IMAGE=$image" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-prebuilt
          build-args: RUST_VERSION=${{ env.RUST_VERSION }}
          tags: ${{ env.OPENPLOTVA_IMAGE }}
          push: true
          cache-from: type=gha,scope=openplotva-runtime-prebuilt
          cache-to: type=gha,mode=min,scope=openplotva-runtime-prebuilt

      - name: Configure SSH
        shell: bash
        env:
          GETA_SSH_PRIVATE_KEY: ${{ secrets.GETA_SSH_PRIVATE_KEY }}
          GETA_SSH_KNOWN_HOSTS: ${{ secrets.GETA_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$GETA_SSH_PRIVATE_KEY"
          test -n "$GETA_SSH_KNOWN_HOSTS"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$GETA_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          eval "$(ssh-agent -s)"
          printf '%s\n' "$GETA_SSH_PRIVATE_KEY" | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Upload deploy assets
        shell: bash
        run: |
          set -euo pipefail
          ssh "$GETA_SSH_TARGET" "install -d -m 755 '$GETA_DEPLOY_ROOT' '$GETA_DEPLOY_ROOT/tools/embedder' '$GETA_DEPLOY_ROOT/tools/token-estimator'"
          scp deploy/production/compose.production.yml "$GETA_SSH_TARGET:$GETA_DEPLOY_ROOT/compose.production.yml"
          scp deploy/production/deploy-production.sh "$GETA_SSH_TARGET:$GETA_DEPLOY_ROOT/deploy-production.sh"
          tar -C tools/embedder -czf - . | ssh "$GETA_SSH_TARGET" "tar -xzf - -C '$GETA_DEPLOY_ROOT/tools/embedder'"
          tar -C tools/token-estimator -czf - . | ssh "$GETA_SSH_TARGET" "tar -xzf - -C '$GETA_DEPLOY_ROOT/tools/token-estimator'"
          ssh "$GETA_SSH_TARGET" "chmod 755 '$GETA_DEPLOY_ROOT/deploy-production.sh'"

      - name: Apply production deployment
        shell: bash
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          OPENPLOTVA_PRODUCTION_ENV_B64: ${{ secrets.OPENPLOTVA_PRODUCTION_ENV_B64 }}
        run: |
          set -euo pipefail
          test -n "$GHCR_PULL_TOKEN"
          printf -v image_q '%q' "$OPENPLOTVA_IMAGE"
          printf -v token_q '%q' "$GHCR_PULL_TOKEN"
          printf -v actor_q '%q' "$GITHUB_ACTOR"
          printf -v env_q '%q' "${OPENPLOTVA_PRODUCTION_ENV_B64:-}"
          ssh "$GETA_SSH_TARGET" \
            "OPENPLOTVA_DEPLOY_IMAGE=$image_q GHCR_USERNAME=$actor_q GHCR_PULL_TOKEN=$token_q OPENPLOTVA_PRODUCTION_ENV_B64=$env_q '$GETA_DEPLOY_ROOT/deploy-production.sh'"

      - name: Cleanup old GHCR images
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN:-}" || {
            echo "GITHUB_TOKEN is required for post-deploy package cleanup" >&2
            exit 1
          }

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          package="${GITHUB_REPOSITORY#*/}"
          package="${package,,}"
          current_tag="${GITHUB_SHA}"
          deployed_image="$(ssh "$GETA_SSH_TARGET" "docker inspect -f '{{.Config.Image}}' openplotva-openplotva-1 2>/dev/null || true")"
          deployed_tag="${deployed_image##*:}"
          cutoff_epoch="$(date -u -d '1 day ago' +%s)"
          versions_file="$(mktemp)"

          echo "Cleaning GHCR package ${owner}/${package}; keeping current tag ${current_tag} and deployed tag ${deployed_tag}"
          gh api --paginate --slurp "/users/${owner}/packages/container/${package}/versions?per_page=100" > "$versions_file"

          deleted=0
          while IFS= read -r version; do
            id="$(jq -r '.id' <<<"$version")"
            created_at="$(jq -r '.created_at' <<<"$version")"
            created_epoch="$(date -u -d "$created_at" +%s)"
            tags="$(jq -r '[.metadata.container.tags[]?] | join(",")' <<<"$version")"

            if (( created_epoch >= cutoff_epoch )); then
              continue
            fi
            if jq -e --arg tag "$current_tag" '.metadata.container.tags // [] | index($tag)' <<<"$version" >/dev/null; then
              continue
            fi
            if [[ -n "$deployed_tag" ]] && jq -e --arg tag "$deployed_tag" '.metadata.container.tags // [] | index($tag)' <<<"$version" >/dev/null; then
              continue
            fi

            echo "Deleting GHCR version id=${id} created_at=${created_at} tags=${tags:-<none>}"
            gh api -X DELETE "/users/${owner}/packages/container/${package}/versions/${id}"
            deleted=$((deleted + 1))
          done < <(jq -c '.[][]' "$versions_file")

          echo "Deleted ${deleted} old GHCR package version(s)"
