name: PR Automation

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
      - review_requested
      - edited
  workflow_dispatch:
    inputs:
      pr_number:
        description: Existing pull request number to review
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pr-automation-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  danger:
    name: Danger PR rules
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Run Danger JS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes danger@13.0.10 ci

  pr-agent:
    name: PR-Agent ${{ matrix.title }}
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.pr_number != '') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false && github.event.action != 'edited' && github.actor != 'github-actions[bot]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - command: review
            title: AI review
          - command: improve
            title: code suggestions
    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Resolve PR target
        id: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PULL_REQUEST_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            pr_url="$(gh pr view "$PR_NUMBER" --json url --jq .url)"
          else
            pr_url="$PULL_REQUEST_URL"
          fi
          test -n "$pr_url"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Run PR-Agent ${{ matrix.command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI__KEY: ${{ secrets.PR_AGENT_OPENAI_KEY }}
          OPENAI_KEY: ${{ secrets.PR_AGENT_OPENAI_KEY }}
          OPENAI__API_BASE: ${{ secrets.PR_AGENT_OPENAI_BASE_URL }}
          PR_AGENT_MODEL: ${{ vars.PR_AGENT_MODEL || 'openai/glm-5.2' }}
          PR_AGENT_FALLBACK_MODELS: ${{ vars.PR_AGENT_FALLBACK_MODELS || '["openai/glm-5.2"]' }}
          PR_AGENT_CUSTOM_MODEL_MAX_TOKENS: ${{ vars.PR_AGENT_CUSTOM_MODEL_MAX_TOKENS || '1000000' }}
          PR_AGENT_MAX_MODEL_TOKENS: ${{ vars.PR_AGENT_MAX_MODEL_TOKENS || '1000000' }}
          PR_AGENT_REVIEW_EXTRA_INSTRUCTIONS: >-
            Focus on correctness, security boundaries, async/concurrency hazards,
            external contracts, migrations, and production/runtime risks. Do not
            comment on formatting, style-only lint, dependency advisories, or SAST
            findings already handled by reviewdog and CI.
          PR_AGENT_COMMAND: ${{ matrix.command }}
          PR_URL: ${{ steps.target.outputs.pr_url }}
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          set +e
          docker run --rm \
            -i \
            --entrypoint python \
            -e GITHUB_TOKEN \
            -e "GITHUB.USER_TOKEN=$GITHUB_TOKEN" \
            -e "GITHUB.DEPLOYMENT_TYPE=user" \
            -e OPENAI__KEY \
            -e OPENAI_KEY \
            -e OPENAI__API_BASE \
            -e PR_URL \
            -e "config.model=$PR_AGENT_MODEL" \
            -e "config.fallback_models=$PR_AGENT_FALLBACK_MODELS" \
            -e "config.custom_model_max_tokens=$PR_AGENT_CUSTOM_MODEL_MAX_TOKENS" \
            -e "config.max_model_tokens=$PR_AGENT_MAX_MODEL_TOKENS" \
            -e "litellm.drop_params=true" \
            -e "github_action_config.enable_output=false" \
            -e "github.publish_as_check_run=true" \
            -e "pr_reviewer.require_tests_review=false" \
            -e "pr_reviewer.extra_instructions=$PR_AGENT_REVIEW_EXTRA_INSTRUCTIONS" \
            pragent/pr-agent@sha256:ea2ea90f072fd97708755e59827a317272f66097a1ef349eca23d39160bb0baf \
            - 2>&1 <<'PY' | tee "$log_file"
          import asyncio
          import os

          from litellm.litellm_core_utils.logging_worker import GLOBAL_LOGGING_WORKER
          from pr_agent.agent.pr_agent import PRAgent
          from pr_agent.config_loader import get_settings
          from pr_agent.log import setup_logger


          async def main():
              setup_logger(os.environ.get("LOG_LEVEL", "INFO"))
              get_settings().set("CONFIG.CLI_MODE", True)
              get_settings().set("CONFIG.CONFIG_BRANCH", os.environ.get("PR_AGENT_CONFIG_BRANCH") or None)
              get_settings().set("CONFIG.EXTRA_CONFIG_URL", os.environ.get("PR_AGENT_EXTRA_CONFIG_URL"))
              command = os.environ["PR_AGENT_COMMAND"]
              ok = await PRAgent().handle_request(os.environ["PR_URL"], command)
              if not ok:
                  raise RuntimeError(f"PR-Agent command failed: {command}")
              await asyncio.wait_for(GLOBAL_LOGGING_WORKER.flush(), timeout=15)
              await GLOBAL_LOGGING_WORKER.stop()


          asyncio.run(main())
          PY
          status="${PIPESTATUS[0]}"
          set -e
          if (( status != 0 )); then
            exit "$status"
          fi
          if grep -E "ERROR|RuntimeWarning|Traceback|ValueError|Exception|Failed to get git provider|GitHub token is required|Failed to review PR|Failed to generate prediction|Error during LLM inference|BadRequestError|Unknown Model" "$log_file" >/dev/null; then
            echo "PR-Agent reported an inference/command failure while exiting successfully." >&2
            exit 1
          fi
