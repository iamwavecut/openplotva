name: PR Automation

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
      - review_requested
  workflow_dispatch:
    inputs:
      pr_number:
        description: Existing pull request number to review
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pr-automation-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  danger:
    name: Danger PR rules
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # v5

      - name: Setup Node
        uses: actions/setup-node@v7 # v6
        with:
          node-version: 24

      - name: Run Danger JS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes danger@13.0.10 ci

  pr-agent:
    name: PR-Agent review and suggestions
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.pr_number != '') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false && github.event.action != 'edited' && github.actor != 'github-actions[bot]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # v5

      - name: Resolve PR target
        id: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PULL_REQUEST_URL: ${{ github.event.pull_request.html_url }}
          PULL_REQUEST_ADDITIONS: ${{ github.event.pull_request.additions || 0 }}
          PULL_REQUEST_DELETIONS: ${{ github.event.pull_request.deletions || 0 }}
          PULL_REQUEST_CHANGED_FILES: ${{ github.event.pull_request.changed_files || 0 }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            pr_json="$(gh pr view "$PR_NUMBER" --json url,additions,deletions,changedFiles)"
            pr_url="$(jq -r .url <<< "$pr_json")"
            additions="$(jq -r .additions <<< "$pr_json")"
            deletions="$(jq -r .deletions <<< "$pr_json")"
            changed_files="$(jq -r .changedFiles <<< "$pr_json")"
          else
            pr_url="$PULL_REQUEST_URL"
            additions="$PULL_REQUEST_ADDITIONS"
            deletions="$PULL_REQUEST_DELETIONS"
            changed_files="$PULL_REQUEST_CHANGED_FILES"
          fi
          test -n "$pr_url"
          changed_lines="$(( additions + deletions ))"
          {
            echo "pr_url=$pr_url"
            echo "changed_lines=$changed_lines"
            echo "changed_files=$changed_files"
          } >> "$GITHUB_OUTPUT"

      - name: Run PR-Agent review and suggestions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI__KEY: ${{ secrets.PR_AGENT_OPENAI_KEY }}
          OPENAI_KEY: ${{ secrets.PR_AGENT_OPENAI_KEY }}
          OPENAI__API_BASE: ${{ secrets.PR_AGENT_OPENAI_BASE_URL }}
          PR_AGENT_MODEL: ${{ vars.PR_AGENT_MODEL || 'openai/glm-5.2' }}
          PR_AGENT_FALLBACK_MODELS: ${{ vars.PR_AGENT_FALLBACK_MODELS || '[]' }}
          PR_AGENT_AI_TIMEOUT: ${{ vars.PR_AGENT_AI_TIMEOUT || '600' }}
          PR_AGENT_REASONING_EFFORT: ${{ vars.PR_AGENT_REASONING_EFFORT || 'low' }}
          PR_AGENT_CUSTOM_MODEL_MAX_TOKENS: ${{ vars.PR_AGENT_CUSTOM_MODEL_MAX_TOKENS || '1000000' }}
          PR_AGENT_MAX_MODEL_TOKENS: ${{ vars.PR_AGENT_MAX_MODEL_TOKENS || '1000000' }}
          PR_AGENT_IMPROVE_MAX_CHANGED_LINES: ${{ vars.PR_AGENT_IMPROVE_MAX_CHANGED_LINES || '800' }}
          PR_AGENT_IMPROVE_MAX_CHANGED_FILES: ${{ vars.PR_AGENT_IMPROVE_MAX_CHANGED_FILES || '12' }}
          PR_AGENT_PUBLISH_NO_FINDINGS: ${{ vars.PR_AGENT_PUBLISH_NO_FINDINGS || 'false' }}
          PR_AGENT_REVIEW_EXTRA_INSTRUCTIONS: >-
            Report only concrete, evidence-backed defects that materially affect
            correctness, security boundaries, async/concurrency safety, external
            contracts, migrations, or production behavior. If the changed code is
            correct, return no findings. Do not nitpick, speculate about hidden
            problems without code evidence, or suggest optional style changes,
            refactors, cleanup, or tests. Do not repeat dependency advisories or SAST
            findings already handled by reviewdog and CI. Keep any findings concise.
          PR_URL: ${{ steps.target.outputs.pr_url }}
          PR_CHANGED_LINES: ${{ steps.target.outputs.changed_lines }}
          PR_CHANGED_FILES: ${{ steps.target.outputs.changed_files }}
        run: |
          set -euo pipefail
          export PR_AGENT_SKIP_IMPROVE=false
          if {
            (( PR_CHANGED_LINES > PR_AGENT_IMPROVE_MAX_CHANGED_LINES )) ||
            (( PR_CHANGED_FILES > PR_AGENT_IMPROVE_MAX_CHANGED_FILES ));
          }; then
            echo "::notice title=PR-Agent improve skipped::PR has ${PR_CHANGED_LINES} changed lines across ${PR_CHANGED_FILES} files; limits are ${PR_AGENT_IMPROVE_MAX_CHANGED_LINES} lines and ${PR_AGENT_IMPROVE_MAX_CHANGED_FILES} files."
            export PR_AGENT_SKIP_IMPROVE=true
          fi
          log_file="$(mktemp)"
          set +e
          docker run --rm \
            -i \
            --entrypoint python \
            -v "$PWD/.github/scripts/run_pr_agent_pair.py:/tmp/run_pr_agent_pair.py:ro" \
            -e GITHUB_TOKEN \
            -e "GITHUB.USER_TOKEN=$GITHUB_TOKEN" \
            -e "GITHUB.DEPLOYMENT_TYPE=user" \
            -e OPENAI__KEY \
            -e OPENAI_KEY \
            -e OPENAI__API_BASE \
            -e PR_URL \
            -e PR_AGENT_MODEL \
            -e PR_AGENT_FALLBACK_MODELS \
            -e PR_AGENT_AI_TIMEOUT \
            -e PR_AGENT_REASONING_EFFORT \
            -e PR_AGENT_CUSTOM_MODEL_MAX_TOKENS \
            -e PR_AGENT_MAX_MODEL_TOKENS \
            -e PR_AGENT_SKIP_IMPROVE \
            -e PR_AGENT_PUBLISH_NO_FINDINGS \
            -e PR_AGENT_REVIEW_EXTRA_INSTRUCTIONS \
            pragent/pr-agent@sha256:ea2ea90f072fd97708755e59827a317272f66097a1ef349eca23d39160bb0baf \
            /tmp/run_pr_agent_pair.py 2>&1 | tee "$log_file"
          status="${PIPESTATUS[0]}"
          set -e
          if (( status != 0 )); then
            exit "$status"
          fi
          if grep -E "ERROR|RuntimeWarning|Traceback|ValueError|Exception|Failed to get git provider|GitHub token is required|Failed to review PR|Failed to generate prediction|Error during LLM inference|BadRequestError|Unknown Model" "$log_file" >/dev/null; then
            echo "PR-Agent reported an inference/command failure while exiting successfully." >&2
            exit 1
          fi
