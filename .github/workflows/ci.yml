name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  RUST_VERSION: "1.95.0"

permissions:
  contents: read

jobs:
  rust-workspace:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component clippy --component rustfmt
          rustup default "$RUST_VERSION"

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  container-image:
    name: Container image
    runs-on: ubuntu-latest
    needs: rust-workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build runtime image
        run: docker build --target runtime --build-arg RUST_VERSION="$RUST_VERSION" -t openplotva:ci .
