name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  RUST_VERSION: "1.95.0"
  CARGO_DENY_VERSION: "0.19.7"
  CARGO_AUDIT_VERSION: "0.22.1"
  CARGO_MACHETE_VERSION: "0.9.2"

permissions:
  contents: read

jobs:
  rust-workspace:
    name: Rust workspace
    runs-on: ubuntu-22.04
    permissions:
      checks: write
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Cache Rust toolchain
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ env.RUST_VERSION }}-workspace-v1

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component rustfmt --component clippy
          rustup default "$RUST_VERSION"

      - name: Setup reviewdog
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: v0.21.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: rust-${{ runner.os }}-ubuntu-22.04-${{ env.RUST_VERSION }}-workspace

      - name: Review Rust formatting
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          cargo fmt --all
          fmt_status=$?
          git diff -- . > rustfmt.diff
          if [[ -s rustfmt.diff ]]; then
            cat rustfmt.diff
            reviewdog \
              -name=rustfmt \
              -f=diff \
              -f.diff.strip=1 \
              -reporter=github-pr-check \
              -filter-mode=diff_context \
              -level=error \
              < rustfmt.diff || echo "reviewdog rustfmt report failed" >&2
            exit 1
          fi
          exit "$fmt_status"

      - name: Review Cargo diagnostics
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          cargo clippy --workspace --all-targets --all-features --message-format=json -- -D warnings > cargo-clippy.jsonl
          clippy_status=$?
          set -e
          jq -r 'select(.reason == "compiler-message") | .message.rendered // empty' cargo-clippy.jsonl
          jq -n -f tools/reviewdog-cargo-diagnostics.jq cargo-clippy.jsonl > cargo-clippy.rdjson
          cat cargo-clippy.rdjson | reviewdog \
            -name=cargo-clippy \
            -f=rdjson \
            -reporter=github-pr-check \
            -filter-mode=diff_context \
            -level=warning || echo "reviewdog cargo clippy report failed" >&2
          exit "$clippy_status"

      - name: Run fast Rust quality gate
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]]; then
            tools/rust-fast-gate.sh --skip-clippy
          else
            tools/rust-fast-gate.sh
          fi

      - name: Build release binary
        if: ${{ github.event_name != 'pull_request' }}
        run: cargo build --locked --release -p openplotva-app

      - name: Upload release binary
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openplotva-app-linux-amd64
          path: target/release/openplotva-app
          if-no-files-found: error
          retention-days: 1

  rust-dependencies:
    name: Rust dependencies
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Cache Rust toolchain
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ env.RUST_VERSION }}-dependencies-v1

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"

      - name: Setup reviewdog
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: v0.21.0

      - name: Cache Rust dependency artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: rust-${{ runner.os }}-${{ env.RUST_VERSION }}-dependencies

      - name: Cache cargo analysis tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/cargo-deny
            ~/.cargo/bin/cargo-audit
            ~/.cargo/bin/cargo-machete
          key: cargo-tools-${{ runner.os }}-deny-${{ env.CARGO_DENY_VERSION }}-audit-${{ env.CARGO_AUDIT_VERSION }}-machete-${{ env.CARGO_MACHETE_VERSION }}

      - name: Install dependency analysis tools
        run: |
          install_tool() {
            local bin="$1"
            local crate="$2"
            local version="$3"
            if command -v "$bin" >/dev/null 2>&1 && "$bin" --version | grep -F "$version" >/dev/null 2>&1; then
              echo "${bin} ${version} restored from cache"
            else
              cargo install "$crate" --locked --version "$version"
            fi
          }

          install_tool cargo-deny cargo-deny "$CARGO_DENY_VERSION"
          install_tool cargo-audit cargo-audit "$CARGO_AUDIT_VERSION"
          install_tool cargo-machete cargo-machete "$CARGO_MACHETE_VERSION"

      - name: Review cargo deny diagnostics
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          cargo deny --format sarif check > cargo-deny.sarif
          deny_status=$?
          set -e
          jq '(.runs[]?.results) |= map(select(.level == "error"))' cargo-deny.sarif > cargo-deny-errors.sarif
          if jq -e 'any(.runs[]?.results[]?; true)' cargo-deny-errors.sarif >/dev/null; then
            cat cargo-deny-errors.sarif | reviewdog \
              -name=cargo-deny \
              -f=sarif \
              -reporter=github-pr-check \
              -filter-mode=file \
              -level=warning || echo "reviewdog cargo deny report failed" >&2
          fi
          exit "$deny_status"

      - name: Dependency gate
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]]; then
            tools/rust-dependency-gate.sh --skip-deny
          else
            tools/rust-dependency-gate.sh
          fi

  container-image:
    name: Container image
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - rust-workspace
      - rust-dependencies
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download release binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: openplotva-app-linux-amd64
          path: target/release

      - name: Prepare release binary
        run: chmod 755 target/release/openplotva-app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build runtime image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          target: runtime-prebuilt
          build-args: RUST_VERSION=${{ env.RUST_VERSION }}
          tags: openplotva:ci
          cache-from: type=gha,scope=openplotva-runtime-prebuilt
          cache-to: type=gha,mode=min,scope=openplotva-runtime-prebuilt
