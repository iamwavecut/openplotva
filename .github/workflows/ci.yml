name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  RUST_VERSION: "1.95.0"
  CARGO_DENY_VERSION: "0.19.7"
  CARGO_AUDIT_VERSION: "0.22.1"
  CARGO_MACHETE_VERSION: "0.9.2"

permissions:
  contents: read

jobs:
  rust-workspace:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component clippy --component rustfmt
          rustup default "$RUST_VERSION"

      - name: Fast Rust gate
        run: tools/rust-fast-gate.sh

  rust-dependencies:
    name: Rust dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"

      - name: Install dependency analysis tools
        run: |
          cargo install cargo-deny --locked --version "$CARGO_DENY_VERSION"
          cargo install cargo-audit --locked --version "$CARGO_AUDIT_VERSION"
          cargo install cargo-machete --locked --version "$CARGO_MACHETE_VERSION"

      - name: Dependency gate
        run: tools/rust-dependency-gate.sh

  container-image:
    name: Container image
    runs-on: ubuntu-latest
    needs:
      - rust-workspace
      - rust-dependencies
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build runtime image
        run: docker build --target runtime --build-arg RUST_VERSION="$RUST_VERSION" -t openplotva:ci .
